<div class="container">
  <h2>Categorías</h2>

  <!-- Gráfica de stock por categoría -->
  <div class="chart-card">
    <div class="chart-header">
      <h3><i class="fas fa-chart-bar"></i> Stock de Vehículos por Categoría</h3>
      <span class="chart-subtitle">Número total de vehículos publicados en cada categoría</span>
    </div>
    <div class="chart-wrapper">
      <canvas #stockChart></canvas>
    </div>
  </div>

  <!-- Tabla de categorías -->
  <div class="table-header">
    <h3>Lista de Categorías</h3>

    <!-- Formulario edición (solo visible al editar) -->
    <div class="form-group" *ngIf="editing">
      <input
        type="text"
        [(ngModel)]="categoria.nombre"
        class="form-control"
        placeholder="Nombre de la categoría"
      />
      <div class="form-buttons">
        <button (click)="saveCategoria()" class="btn btn-info">Actualizar</button>
        <button (click)="cancelEdit()" class="btn btn-danger">Cancelar</button>
      </div>
    </div>

    <table class="category-table">
      <thead>
      <tr>
        <th class="id">ID</th>
        <th class="nombre">Nombre</th>
        <th class="acciones">Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let cat of categorias">
        <td class="id">{{ cat.id }}</td>
        <td class="nombre">{{ cat.nombre }}</td>
        <td class="acciones">
          <div class="action-buttons">
            <button (click)="editCategoria(cat)" class="btn btn-info btn-sm">Editar</button>
            <button (click)="deleteCategoria(cat.id)" class="btn btn-info btn-sm">Eliminar</button>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <!-- Mensaje de carga -->
  <div *ngIf="isLoading" class="alert alert-info">Cargando categorías...</div>
</div>
